name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) and provenance

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Set package version from release tag
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Build (TypeScript compilation)
        run: npm run build

      - name: Lint (Biome)
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      - name: Publish to npm (trusted publishing via OIDC)
        run: npm publish
