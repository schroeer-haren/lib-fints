name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write # required to publish to GitHub Packages via GITHUB_TOKEN

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: 'https://npm.pkg.github.com'
          scope: '@schroeer-haren'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set package version from release tag
        run: npm version "${TAG#v}" --no-git-tag-version --allow-same-version
        env:
          TAG: ${{ github.event.release.tag_name }}

      - name: Build (TypeScript compilation)
        run: npm run build

      - name: Lint (Biome)
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
